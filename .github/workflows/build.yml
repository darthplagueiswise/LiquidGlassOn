name: Build LiquidGlassOn Test

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build LiquidGlassOn (.deb)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Normalize script permissions
        run: |
          chmod +x ./build.sh ./build-dev.sh ./build-fast.sh || true
          find scripts -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

      - name: Install dependencies
        run: brew install ldid dpkg make

      - name: Set PATH (GNU make)
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: SDK cache
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iPhoneOS16.2.sdk
        with:
          path: ${{ github.workspace }}/theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS 16.2 SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 \
            https://github.com/xybp888/iOS-SDKs/
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS16.2.sdk
          git checkout
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Set build version
        id: version
        run: |
          RAW_VERSION=$(awk '/Version:/ {print $2}' control)
          BASE_VERSION=$(printf '%s\n' "$RAW_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          BRANCH_NAME="${GITHUB_REF_NAME////-}"
          RUN_NUMBER="${GITHUB_RUN_NUMBER}"
          BUILD_VERSION="${BASE_VERSION}.${RUN_NUMBER}"
          BUILD_LABEL="${BRANCH_NAME}_${BASE_VERSION}_#${RUN_NUMBER}"
          PACKAGE_NAME="LiquidGlassOn_${BUILD_LABEL}.deb"

          # macOS-compatible sed (no -i '' issue in GHA)
          sed -i '' "s/^Version:.*/Version: ${BUILD_VERSION}/" control 2>/dev/null \
            || sed -i "s/^Version:.*/Version: ${BUILD_VERSION}/" control

          echo "BASE_VERSION=${BASE_VERSION}"  >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=${BRANCH_NAME}"    >> "$GITHUB_ENV"
          echo "RUN_NUMBER=${RUN_NUMBER}"       >> "$GITHUB_ENV"
          echo "BUILD_LABEL=${BUILD_LABEL}"     >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=${PACKAGE_NAME}"   >> "$GITHUB_ENV"
          echo "base_version=${BASE_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}"     >> "$GITHUB_OUTPUT"
          echo "run_number=${RUN_NUMBER}"        >> "$GITHUB_OUTPUT"
          echo "build_label=${BUILD_LABEL}"      >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}"    >> "$GITHUB_OUTPUT"
          echo "Using ${BUILD_VERSION} (${BUILD_LABEL})"
          grep '^Version:' control

      - name: Build rootless .deb
        run: |
          export THEOS="${{ github.workspace }}/theos"
          make FINALPACKAGE=1 package THEOS_PACKAGE_SCHEME=rootless
          cd packages
          DEB="$(ls -t *.deb | head -n1)"
          [ -n "$DEB" ] && mv "$DEB" "$PACKAGE_NAME"
          ls -la

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: "LiquidGlassOn_${{ steps.version.outputs.branch_name }}_v${{ steps.version.outputs.base_version }}_#${{ steps.version.outputs.run_number }}"
          path: packages/${{ steps.version.outputs.package_name }}
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/${{ steps.version.outputs.package_name }}
          generate_release_notes: true
